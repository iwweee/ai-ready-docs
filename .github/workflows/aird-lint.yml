name: AIRD Compliance Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run AIRD Linter
        run: |
          # 假设你使用了 v3 版本，如果没有，请改为 aird_lint.py
          python3 aird_lint_v4.py .
